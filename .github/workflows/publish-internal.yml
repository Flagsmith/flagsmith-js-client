name: Publish Internal NPM Package

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    name: Publish Internal NPM Package

    steps:
      - name: Cloning repo
        uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - run: npm i
      - run: npm run build && npm test && cd ./lib/flagsmith/ && npm publish --tag internal --access public && cd ../../lib/react-native-flagsmith && npm publish --tag internal --access public
